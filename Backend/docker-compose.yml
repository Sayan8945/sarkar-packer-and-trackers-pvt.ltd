version: "3.9"

services:
  backend:
    build: .
    container_name: sarkar-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - sarkar-net

  mongo:
    image: mongo:7
    container_name: sarkar-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - sarkar-net

volumes:
  mongo-data:

networks:
  sarkar-net:
    driver: bridge
